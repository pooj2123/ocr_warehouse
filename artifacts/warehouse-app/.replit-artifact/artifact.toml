kind = "web"
previewPath = "/"
title = "Warehouse Register"
version = "1.0.0"
id = "artifacts/warehouse-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24630

[services.development]
run = "pnpm --filter @workspace/warehouse-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/warehouse-app", "run", "build" ]
publicDir = "artifacts/warehouse-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24630"
BASE_PATH = "/"
