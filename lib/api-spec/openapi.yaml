openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: warehouse
    description: Warehouse register operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /warehouse/process:
    post:
      operationId: processRegister
      tags: [warehouse]
      summary: Process register images and generate Excel
      description: Upload images, extract data via AI, generate Excel workbook
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "200":
          description: Excel file generated successfully
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterInput:
      type: object
      properties:
        entryType:
          type: string
          enum: [inward, outward]
        openingCapacityMode:
          type: string
          enum: [manual, carryforward]
        openingCapacityValue:
          type: ["number", "null"]
      required:
        - entryType
        - openingCapacityMode

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
